<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanay Singh — Digital Marketer & Video Creator</title>
  <meta name="description" content="Tanay Singh — digital marketer specializing in marketing videos, paid ads, and growth campaigns for brands. 6+ years driving measurable ROI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!--
    Hidden static form so Netlify detects "contact" at build time.
    The real (React) form is submitted via JS in src/components/Contact.jsx.
  -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <textarea name="message"></textarea>
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
